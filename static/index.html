<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocaption Web - Subtitle Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --error: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .flow {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .flow span { color: var(--accent); }
    .device-info {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }
    .device-info.gpu { border-left-color: var(--success); }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }
    .upload-zone input { display: none; }
    .upload-zone p { margin-bottom: 0.5rem; }
    .upload-zone .hint { color: var(--muted); font-size: 0.85rem; }
    .upload-zone.has-file {
      border-color: var(--success);
      background: rgba(63, 185, 80, 0.08);
    }
    .upload-zone.has-file .placeholder { display: none; }
    .upload-zone .file-preview { display: none; }
    .upload-zone.has-file .file-preview { display: block; }
    .file-preview {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      text-align: left;
    }
    .file-preview .icon {
      font-size: 2rem;
      opacity: 0.8;
    }
    .file-preview .info { flex: 1; min-width: 0; }
    .file-preview .name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-preview .size { font-size: 0.8rem; color: var(--muted); }
    .file-preview .remove {
      padding: 0.35rem 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .file-preview .remove:hover { color: var(--error); border-color: var(--error); }
    .progress-wrap {
      margin-top: 1rem;
      display: none;
    }
    .progress-wrap.active { display: block; }
    .progress-wrap .label {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar {
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 4px;
      width: 0%;
      transition: width 0.2s ease;
    }
    .progress-wrap.processing .progress-bar .fill {
      width: 100%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .opts {
      display: flex;
      gap: 1.5rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .opt label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; }
    .opt select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-family: inherit;
    }
    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .log-box {
      margin-top: 2rem;
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-box:empty { display: none; }
    .log-box .err { color: var(--error); }
    .log-box .ok { color: var(--success); }
    .downloads {
      margin-top: 1rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .downloads a {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: var(--success);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    .downloads a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Autocaption Web</h1>
    <p class="subtitle">Generate subtitle (SRT/VTT) dari video atau audio</p>
    <div class="flow">
      Video/Audio → FFmpeg (extract) → Whisper (ASR) → SRT / VTT
    </div>
    <div class="device-info" id="deviceInfo"></div>

    <div class="upload-zone" id="zone">
      <input type="file" id="file" accept=".mp4,.mkv,.avi,.mov,.webm,.mp3,.wav,.m4a,.flac,.ogg,.aac,.wma,.flv,.wmv">
      <div class="placeholder">
        <p>Klik atau drag & drop file video/audio</p>
        <p class="hint">MP4, MKV, AVI, MOV, WebM, MP3, WAV, M4A, FLAC, dll.</p>
      </div>
      <div class="file-preview">
        <span class="icon">🎬</span>
        <div class="info">
          <div class="name" id="fileName">—</div>
          <div class="size" id="fileSize">—</div>
        </div>
        <button type="button" class="remove" id="removeFile">Hapus</button>
      </div>
    </div>

    <div class="opts">
      <div class="opt">
        <label>Model Whisper</label>
        <select id="model">
          <option value="tiny">Tiny (cepat)</option>
          <option value="base">Base</option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large" selected>Large (akurat, GPU recommended)</option>
          <option value="large-v2">Large-v2</option>
          <option value="large-v3">Large-v3</option>
        </select>
      </div>
      <div class="opt">
        <label>Format Subtitle</label>
        <select id="format">
          <option value="srt">SRT</option>
          <option value="vtt">VTT</option>
          <option value="both">SRT + VTT</option>
        </select>
      </div>
    </div>

    <button class="btn" id="submit" disabled>Proses</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="label">
        <span id="progressLabel">Mengunggah...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="fill" id="progressFill"></div>
      </div>
    </div>

    <div class="log-box" id="log"></div>
    <div class="downloads" id="downloads"></div>
  </div>

  <script>
    const zone = document.getElementById('zone');
    const fileInput = document.getElementById('file');
    const submitBtn = document.getElementById('submit');
    const logBox = document.getElementById('log');
    const downloadsEl = document.getElementById('downloads');

    let selectedFile = null;

    // Tampilkan status GPU
    fetch('/api/device').then(r => r.json()).then(d => {
      const el = document.getElementById('deviceInfo');
      if (d.device === 'cuda') {
        el.textContent = `GPU: ${d.gpu_name} (fp16 aktif)`;
        el.classList.add('gpu');
      } else {
        el.textContent = 'CPU mode (GPU tidak terdeteksi)';
      }
    }).catch(() => {});

    zone.addEventListener('click', () => fileInput.click());
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        onFileSelect();
      }
    });
    fileInput.addEventListener('change', onFileSelect);

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function onFileSelect() {
      selectedFile = fileInput.files[0] || null;
      submitBtn.disabled = !selectedFile;
      zone.classList.toggle('has-file', !!selectedFile);
      if (selectedFile) {
        document.getElementById('fileName').textContent = selectedFile.name;
        document.getElementById('fileSize').textContent = formatSize(selectedFile.size);
      }
    }

    document.getElementById('removeFile').addEventListener('click', (e) => {
      e.stopPropagation();
      fileInput.value = '';
      selectedFile = null;
      submitBtn.disabled = true;
      zone.classList.remove('has-file');
      document.getElementById('fileName').textContent = '—';
      document.getElementById('fileSize').textContent = '—';
    });

    function log(msg, isErr = false) {
      const span = document.createElement('span');
      span.textContent = msg + '\n';
      if (isErr) span.className = 'err';
      logBox.appendChild(span);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
      logBox.innerHTML = '';
      downloadsEl.innerHTML = '';
    }

    function setProgress(pct, label, isProcessing) {
      const wrap = document.getElementById('progressWrap');
      const fill = document.getElementById('progressFill');
      const pctEl = document.getElementById('progressPct');
      const labelEl = document.getElementById('progressLabel');
      wrap.classList.add('active');
      wrap.classList.toggle('processing', !!isProcessing);
      fill.style.width = pct + '%';
      pctEl.textContent = isProcessing ? '...' : Math.round(pct) + '%';
      labelEl.textContent = label || 'Mengunggah...';
    }

    function hideProgress() {
      document.getElementById('progressWrap').classList.remove('active', 'processing');
    }

    submitBtn.addEventListener('click', () => {
      if (!selectedFile) return;
      clearLog();
      submitBtn.disabled = true;
      log('Mengunggah file...');
      setProgress(0, 'Mengunggah...', false);

      const form = new FormData();
      form.append('file', selectedFile);
      form.append('model_size', document.getElementById('model').value);
      form.append('format', document.getElementById('format').value);

      const xhr = new XMLHttpRequest();

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = (e.loaded / e.total) * 100;
          setProgress(pct, 'Mengunggah...', false);
          if (pct >= 100) {
            setProgress(100, 'Memproses (FFmpeg → Whisper)...', true);
          }
        } else if (e.loaded > 0) {
          setProgress(50, 'Mengunggah...', true);
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          try {
            const data = JSON.parse(xhr.responseText);
            data.logs.forEach(l => log(l, l.includes('Error') || l.includes('Traceback')));
            if (data.error) log(data.error, true);

            if (data.success && data.downloads?.length) {
              data.downloads.forEach(d => {
                const a = document.createElement('a');
                a.href = d.url;
                a.download = d.filename;
                a.textContent = 'Download ' + d.format.toUpperCase();
                downloadsEl.appendChild(a);
              });
            }
          } catch (e) {
            log('Error parsing response: ' + e.message, true);
          }
        } else {
          log('Upload gagal: ' + xhr.status, true);
        }
        hideProgress();
        submitBtn.disabled = false;
      });

      xhr.addEventListener('error', () => {
        log('Network error', true);
        hideProgress();
        submitBtn.disabled = false;
      });

      xhr.addEventListener('abort', () => {
        hideProgress();
        submitBtn.disabled = false;
      });

      xhr.open('POST', '/api/upload');
      xhr.send(form);
    });
  </script>
</body>
</html>
